<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    
    <!-- <header class="header">HEADER</header> -->

    <section class="hero">
        <div class="stars-container" id="stars"></div>
        <div class="hero-container">
            <div class="hero-center">
                <img src="hero-center.svg" alt="Hero Center">
            </div>
            <div class="hero-orbit">
                <div class="orbit-item">
                    <a href="#" style="--glow-color: #00d9ff;">Веб-разработка</a>
                </div>
                <div class="orbit-item">
                    <a href="#" style="--glow-color: #ff57b2;">VPN</a>
                </div>
                <div class="orbit-item">
                    <a href="#" style="--glow-color: #6e57ff;">Ботостроение</a>
                </div>
                <div class="orbit-item">
                    <a href="#" style="--glow-color: #57ffdc;">Mini App's</a>
                </div>
                <div class="orbit-item">
                    <a href="#" style="--glow-color: #ff9e57;">UI/UX Design</a>
                </div>
                <div class="orbit-item">
                    <a href="#" style="--glow-color: #5788ff;">SEO</a>
                </div>
            </div>           <!-- Дополнительные декоративные орбиты -->
            <div class="decor-orbit orbit-1">
                <div class="planet p-1"></div>
                <div class="planet p-1-2"></div>
            </div>
            <div class="decor-orbit orbit-2">
                <div class="planet p-2"></div>
                <div class="planet p-2-2"></div>
            </div>
            <div class="decor-orbit orbit-3">
                <div class="planet p-3"></div>
                <div class="planet p-3-2"></div>

            </div>
        </div>
